<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0" style="color: #8b0000;">Credit Management</h2>
        <a href="/" class="btn btn-outline-danger">Back to Dashboard</a>
    </div>
    
    <div class="card mb-4 shadow-sm border-0">
        <div class="card-header bg-white fw-bold py-3" style="color: #8b0000;">
            Issue New Credit
        </div>
        <div class="card-body p-4">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label text-muted small">Customer Name</label>
                        <input type="text" class="form-control" name="customer_name" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-muted small">Credit Balance</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" class="form-control" name="balance" required>
                        </div>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button type="submit" class="btn text-white w-100" style="background-color: #8b0000;">Add Account</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover table-striped m-0">
                <thead class="text-white" style="background-color: #8b0000;">
                    <tr>
                        <th class="ps-4">Account ID</th>
                        <th>Customer Name</th>
                        <th class="pe-4">Current Balance</th>
                    </tr>
                </thead>
                <tbody>
                    {% for credit in credits %}
                    <tr>
                        <td class="ps-4">#{{ "%04d" | format(credit['id']) }}</td>
                        <td class="fw-medium">{{ credit['customer_name'] }}</td>
                        <td class="pe-4 fw-bold text-danger">${{ credit['balance'] }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center py-4 text-muted">No credit accounts found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
